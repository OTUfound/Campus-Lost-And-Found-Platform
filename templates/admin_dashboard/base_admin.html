{% extends 'base.html' %}

{% block title %}Admin Dashboard - OTU Found{% endblock %}

{% block content %}
<div class="row">
    <!-- Admin Sidebar -->
    <div class="col-lg-3 mb-4">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-dark text-white fw-bold py-3">
                <i class="bi bi-speedometer2 me-2"></i>Admin Dashboard
            </div>
            <div class="list-group list-group-flush">
                <a href="{% url 'admin_dashboard' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
                    <i class="bi bi-graph-up me-2"></i>Overview
                </a>
                <a href="{% url 'admin_users' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'admin_users' %}active{% endif %}">
                    <i class="bi bi-people me-2"></i>Manage Users
                </a>
                <a href="{% url 'admin_items' %}" class="list-group-item list-group-item-action {% if request.resolver_match.url_name == 'admin_items' %}active{% endif %}">
                    <i class="bi bi-box me-2"></i>Moderate Items
                </a>
                <a href="{% url 'profile' %}" class="list-group-item list-group-item-action border-top mt-2 text-muted">
                    <i class="bi bi-arrow-left-circle me-2"></i>Back to My Profile
                </a>
            </div>
        </div>
    </div>

    <!-- Admin Content Area -->
    <div class="col-lg-9">
        {% block admin_content %}
        {% endblock %}
    </div>
</div>
{% endblock %}
