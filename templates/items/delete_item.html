{% extends 'base.html' %}

{% block title %}Delete Item - OTU Found{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0">Delete Item</h3>
            </div>
            <div class="card-body">
                <div class="alert alert-warning">
                    <h5>Are you sure?</h5>
                    <p>You are about to delete: <strong>{{ item.title }}</strong></p>
                    <p class="mb-0 text-muted">This item will be marked as inactive but data will be retained for record-keeping.</p>
                </div>

                <form method="post" class="d-flex gap-2">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Delete Item</button>
                    <a href="{% url 'item_detail' item.pk %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
