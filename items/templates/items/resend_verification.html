{% extends "items/base.html" %}

{% block title %}Resend Verification Email - OTU Found{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-5">
                <h2 class="card-title text-center mb-4">Resend Verification Email</h2>
                <p class="text-center text-muted mb-4">Enter your email address to receive a new verification link.</p>

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="your@ostimteknik.edu.tr">
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Send Verification Email</button>
                </form>

                <hr>
                <p class="text-center text-muted small">
                    Remember your password? <a href="{% url 'account_login' %}">Login here</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
