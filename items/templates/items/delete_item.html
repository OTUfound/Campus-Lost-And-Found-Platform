{% extends "items/base.html" %}

{% block title %}Delete Item - OTU Found{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-body p-5">
                <h2 class="card-title text-danger mb-4">Delete Item</h2>
                <p class="card-text">Are you sure you want to delete "<strong>{{ item.title }}</strong>"?</p>
                <p class="text-muted small">This action cannot be undone.</p>

                <form method="POST" class="d-flex gap-2">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Delete</button>
                    <a href="{% url 'item_detail' item.pk %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
